<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Морская маршрутизация</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; }
        .container { display: flex; height: 100vh; }
        #map { flex: 3; height: 100%; }
        .sidebar { flex: 1; background: white; border-left: 1px solid #ddd; padding: 20px; overflow-y: auto; }
        h2 { font-size: 18px; margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; }
        select, input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #1e3a8a; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 8px; }
        button:hover { background: #153e75; }
        .result { margin-top: 20px; padding-top: 16px; border-top: 1px solid #eee; font-size: 14px; }
        .stat { font-family: monospace; background: #f0f0f0; padding: 8px; border-radius: 4px; margin-bottom: 8px; }
        hr { margin: 20px 0; }
        .error { color: #dc2626; background: #fee2e2; padding: 8px; border-radius: 4px; margin-top: 8px; }
    </style>
</head>
<body>
<div class="container">
    <div id="map"></div>
    <div class="sidebar">
        <h2>📡 Построение маршрута</h2>
        <div class="form-group">
            <label>Тип судна</label>
            <select id="vesselType">
                <option value="cargo">Грузовое</option>
                <option value="tanker">Танкер</option>
                <option value="passenger">Пассажирское</option>
                <option value="fishing">Рыболовное</option>
                <option value="tug">Буксир</option>
            </select>
        </div>
        <div class="form-group">
            <label>Оптимизация</label>
            <select id="optimization">
                <option value="time">Минимум времени</option>
                <option value="safety">Минимум риска</option>
            </select>
        </div>
        <button id="routeBtn">Построить маршрут</button>
        <button id="clearBtn" style="background:#6b7280;">Очистить маркеры</button>
        <div class="result" id="result"></div>
        <hr>
        <h2>🔍 Поиск похожих ситуаций</h2>
        <div class="form-group">
            <label>Уровень риска (0-1)</label>
            <input type="number" id="riskScore" step="0.1" value="0.6">
        </div>
        <div class="form-group">
            <label>Скорость ветра (м/с)</label>
            <input type="number" id="wind" step="1" value="12">
        </div>
        <div class="form-group">
            <label>Высота волны (м)</label>
            <input type="number" id="wave" step="0.5" value="2.5">
        </div>
        <button id="similarBtn">Найти похожие</button>
        <div class="result" id="similarResult"></div>
    </div>
</div>
<script>
    // Отключаем контроль атрибуции (убираем логотип Leaflet)
    const map = L.map('map', { attributionControl: false }).setView([43.0, 131.9], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: ''
    }).addTo(map);

    let startMarker = null, endMarker = null, routeLayer = null;

    map.on('click', (e) => {
        if (!startMarker) {
            startMarker = L.marker(e.latlng, { draggable: true }).addTo(map)
                .bindPopup('Старт').openPopup();
            startMarker.on('dragend', () => {});
        } else if (!endMarker) {
            endMarker = L.marker(e.latlng, { draggable: true }).addTo(map)
                .bindPopup('Финиш').openPopup();
        } else {
            // Если оба маркера есть, очищаем всё и начинаем заново с текущего клика
            map.removeLayer(startMarker);
            map.removeLayer(endMarker);
            if(routeLayer) map.removeLayer(routeLayer);
            startMarker = null;
            endMarker = null;
            // После очистки ставим новый старт на месте клика
            startMarker = L.marker(e.latlng, { draggable: true }).addTo(map)
                .bindPopup('Старт').openPopup();
        }
    });

    document.getElementById('clearBtn').onclick = () => {
        if(startMarker) map.removeLayer(startMarker);
        if(endMarker) map.removeLayer(endMarker);
        if(routeLayer) map.removeLayer(routeLayer);
        startMarker = null;
        endMarker = null;
    };

    document.getElementById('routeBtn').onclick = async () => {
        if (!startMarker || !endMarker) {
            alert('Укажите точки старта и финиша кликами на карте');
            return;
        }
        const start = startMarker.getLatLng();
        const end = endMarker.getLatLng();
        const vesselType = document.getElementById('vesselType').value;
        const optimization = document.getElementById('optimization').value;

        // Используем полный URL бэкенда
        const apiUrl = 'http://127.0.0.1:8000/api/route';
        try {
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ start: {lat: start.lat, lon: start.lng}, end: {lat: end.lat, lon: end.lng}, vessel_type: vesselType, optimization })
            });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const data = await response.json();
            if (data.segments) {
                if(routeLayer) map.removeLayer(routeLayer);
                const coords = [];
                for (let seg of data.segments) {
                    coords.push([seg.start.lat, seg.start.lon]);
                    coords.push([seg.end.lat, seg.end.lon]);
                }
                routeLayer = L.polyline(coords, {color: '#1e3a8a', weight: 4}).addTo(map);
                map.fitBounds(routeLayer.getBounds());
                document.getElementById('result').innerHTML = `<div class="stat">Расстояние: ${data.total_distance_km.toFixed(1)} км</div><div class="stat">Оптимизация: ${optimization}</div><div class="stat">Сегментов: ${data.segments.length}</div>`;
            } else {
                document.getElementById('result').innerHTML = `<div class="stat">Ошибка: маршрут не найден</div>`;
            }
        } catch (err) {
            document.getElementById('result').innerHTML = `<div class="stat error">Ошибка: ${err.message}</div>`;
        }
    };

    document.getElementById('similarBtn').onclick = async () => {
        const risk = parseFloat(document.getElementById('riskScore').value);
        const wind = parseFloat(document.getElementById('wind').value);
        const wave = parseFloat(document.getElementById('wave').value);
        const vesselType = document.getElementById('vesselType').value;
        const apiUrl = 'http://127.0.0.1:8000/api/similar';
        try {
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ risk_score: risk, wind_speed: wind, wave_height: wave, vessel_type: vesselType, season: 1, k: 5 })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data.similar_situations) {
                let html = '<div class="stat">Похожие ситуации:</div>';
                for (let sit of data.similar_situations.slice(0,5)) {
                    html += `<div class="stat">Риск ${sit.risk_score?.toFixed(2)}, ветер ${sit.wind_speed} м/с, волны ${sit.wave_height} м</div>`;
                }
                if (data.recommended) {
                    html += `<div class="stat"><strong>Рекомендуемая ситуация:</strong> риск ${data.recommended.risk_score?.toFixed(2)}</div>`;
                }
                document.getElementById('similarResult').innerHTML = html;
            } else {
                document.getElementById('similarResult').innerHTML = '<div class="stat">Ничего не найдено</div>';
            }
        } catch (err) {
            document.getElementById('similarResult').innerHTML = `<div class="stat error">Ошибка: ${err.message}</div>`;
        }
    };
</script>
</body>
</html>
